<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="100%" style="stop-color:#0f2447"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#d4a847" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="41" fill="none" stroke="#d4a847" stroke-width="0.5"/>

  <!-- Decorative top arc text path -->
  <path id="topArc" d="M 15,50 A 35,35 0 0,1 85,50" fill="none"/>
  <path id="bottomArc" d="M 18,55 A 33,33 0 0,0 82,55" fill="none"/>

  <!-- Stars top -->
  <text x="50" y="19" text-anchor="middle" font-size="5" fill="#d4a847">★ ★ ★</text>

  <!-- 南开 main characters -->
  <text x="50" y="47" text-anchor="middle" font-family="STSong,SimSun,serif" font-size="18" fill="#d4a847" font-weight="bold" letter-spacing="2">南开</text>

  <!-- 大学 sub characters -->
  <text x="50" y="62" text-anchor="middle" font-family="STSong,SimSun,serif" font-size="10" fill="#c8b97a" letter-spacing="3">大学</text>

  <!-- NKU text bottom -->
  <text x="50" y="76" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#d4a847" letter-spacing="3">NKU</text>

  <!-- Bottom decorative line -->
  <line x1="30" y1="79" x2="70" y2="79" stroke="#d4a847" stroke-width="0.8"/>
</svg>
